{% set name = "pytest-replay" %}
{% set version = "1.7.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_')}}-{{ version }}.tar.gz
  sha256: 855af4fe381a80519d0a5e3d2c06be4148868d499f0421b141e8004225aa7516

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<39]

requirements:
  host:
    - pip
    - python
    - setuptools_scm
    - setuptools >=61
    - setuptools-scm
  run:
    - python
    - pytest

test:
  source_files:
    - tests
  imports:
    - pytest_replay
  commands:
    - pip check
    - pytest -v tests
  requires:
    - pip
    - pytest
    - pytest-xdist

about:
  home: https://github.com/ESSS/pytest-replay
  license: MIT
  license_file: LICENSE
  license_family: MIT
  summary: Saves shell scripts that allow re-execute previous pytest runs to reproduce crashes or flaky tests
  description: Saves previous test runs and allow re-execute previous pytest runs to reproduce crashes or flaky tests
  dev_url: https://github.com/ESSS/pytest-replay
  doc_url: https://github.com/ESSS/pytest-replay/blob/master/README.rst

extra:
  recipe-maintainers:
    - nicoddemus
    - tadeu
    - prusse-martin
